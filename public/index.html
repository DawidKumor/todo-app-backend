<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
  </head>
  <body>
    <h1 class="page-title">My Tasks</h1>
    <button class="toggle-form-button" id="toggleFormBtn">+ Add Task</button>

    <form class="task-form" id="taskForm" hidden>
      <input
        class="task-form__input"
        type="text"
        id="title"
        placeholder="Title"
      />
      <input
        class="task-form__input"
        type="text"
        id="description"
        placeholder="Description"
      />
      <button class="task-form__button" type="submit">Add Task</button>
      <button class="task-form-cancel__button" type="button">Cancel</button>
      <p class="task-form__error" id="formError" hidden></p>
    </form>
    <form class="edit-form" id="editForm" hidden>
      <input
        class="edit-form__input"
        type="text"
        id="editTitle"
        placeholder="Title"
        required
      />
      <input
        class="edit-form__input"
        type="text"
        id="editDescription"
        placeholder="Description"
      />
      <label class="edit-form__label">
        <input class="edit-form__checkbox" type="checkbox" id="editCompleted" />
        Completed
      </label>
      <button class="edit-form__button" type="submit">Save</button>
      <button class="edit-form-cancel__button" type="button">Cancel</button>
      <p class="edit-form__error" id="editFormError" hidden></p>
    </form>

    <ul class="task-list" id="taskList"></ul>

    <script src="script.js"></script>
  </body>
</html>
